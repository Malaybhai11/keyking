name: "Publish KeyKing Releases"

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v0.1.0, v1.0.0)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Builds macOS amd64 & arm64
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04' # Builds Linux deb / AppImage
            args: ''
          - platform: 'windows-latest' # Builds Windows msi / exe
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'apps/desktop/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build target for macOS universal binary if compiling on macOS
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Desktop App Dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Build Tauri Desktop Client
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: keyking-v__VERSION__ # Will be replaced by tauri-action using tag
          releaseName: "KeyKing Desktop v__VERSION__"
          releaseBody: "Automated production release for KeyKing desktop client aggregator."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: './apps/desktop'

  # Optional job to package zip/tar archives and upload them to match installer naming structure
  package-archives:
    needs: publish-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets helper
        uses: actions/github-script@v7
        with:
          script: |
            console.log("Draft release has been created. You can rename/upload ZIP/tar.gz files matching the installer format.");
